  <circle cx="1130" cy="606" r="6" fill="#3FB37F"/>
  <text x="1095" y="612" font-family="JetBrains Mono, monospace" font-size="14" fill="#F5F4EF" opacity="0.7" text-anchor="end">LIVE</text>
