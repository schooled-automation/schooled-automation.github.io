<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0C1117"/>

  <!-- Faint floor-plan grid background -->
  <g stroke="#1E293B" stroke-width="1" fill="none" opacity="0.5">
    <path d="M0 120 H1200 M0 280 H1200 M0 440 H1200"/>
    <path d="M180 0 V630 M420 0 V630 M660 0 V630 M900 0 V630"/>
    <rect x="180" y="120" width="240" height="160"/>
    <rect x="420" y="120" width="240" height="160"/>
    <rect x="660" y="280" width="240" height="160"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(80, 240)">
    <rect width="56" height="100" rx="6" fill="#22C55E"/>
    <rect x="64" y="22" width="56" height="78" rx="6" fill="#1E293B"/>
    <circle cx="60" cy="61" r="11" fill="#22C55E"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="232" y="290" font-family="Space Grotesk, sans-serif" font-size="44" font-weight="600" fill="#E2E8F0">Schooled Automation</text>
  <text x="232" y="338" font-family="DM Sans, sans-serif" font-size="26" fill="#22C55E">Your entire compound on one screen.</text>

  <!-- Footer strip -->
  <rect x="0" y="582" width="1200" height="48" fill="#161B22"/>
  <text x="80" y="613" font-family="IBM Plex Mono, monospace" font-size="18" fill="#E2E8F0" opacity="0.7">schooled-automation.cseco.co.ke</text>
  <circle cx="1130" cy="606" r="6" fill="#22C55E"/>
  <text x="1095" y="612" font-family="IBM Plex Mono, monospace" font-size="14" fill="#E2E8F0" opacity="0.7" text-anchor="end">LIVE</text>
</svg>
